<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Instagram">
    <meta property="og:description" content="Rinky Dink's Instagram">
    <meta property="og:url" content="https://www.instagram.com/rinkydinksrexburg/">
    <meta property="og:image" content="images/instagram_icon.svg">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/fav.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>Recepie Book!!!!!!!!!</title>
</head>
<body>
    <header>
        <img src="images/recipe-book.png" alt="a cookbook with a picture of a hat on it">
        <h1>Recipie Book</h1>
    </header>
    <main>
        <div id="search">
            <p>Find a recepie</p>
            <img id="mag" src="images/search.svg" alt="magnifying glass clip art">
        </div>
        <section id="bar"></section>
        <div class="recepie">
            <img src="images/apple-crisp.jpg" alt="A bowl of apple crisp with a scoop of ice cream on top">
            <div class="right-side">
            <button class="genre">dessert</button>
                <h2>Apple Crisp</h2>
                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                <p class="desc">This apple crisp recipe is a simple yet delicious fall dessert that’s great served warm with vanilla ice cream.</p>
            </div>
        </div>
        
    </main>
    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="https://www.instagram.com/rinkydinksrexburg/"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                  
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                           
    </footer>
</body>
</html>
